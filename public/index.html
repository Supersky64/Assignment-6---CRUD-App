<!DOCTYPE html>
<html>
<head>
    <title>Jokebook</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<h1>Jokebook</h1>

<!-- RANDOM JOKE -->
<section>
    <h2>Random Joke</h2>
    <button id="randomBtn">Get Random Joke</button>
    <div id="randomJoke"></div>
</section>

<hr>

<!-- CATEGORIES -->
<section>
    <h2>Categories</h2>
    <button id="loadCategoriesBtn">Load Categories</button>
    <ul id="categoryList"></ul>
</section>

<hr>

<!-- SEARCH CATEGORY -->
<section>
    <h2>Search Category</h2>
    <input id="searchInput" placeholder="Enter category name">
    <button id="searchBtn">Search</button>
</section>

<!-- JOKES DISPLAY -->
<section>
    <h2>Jokes</h2>
    <div id="jokes"></div>
</section>

<hr>

<!-- ADD JOKE -->
<section>
    <h2>Add a Joke</h2>

    <input id="catInput" placeholder="category">
    <input id="setupInput" placeholder="setup">
    <input id="deliveryInput" placeholder="delivery">

    <button id="addBtn">Add Joke</button>
</section>


</body>
</html>
